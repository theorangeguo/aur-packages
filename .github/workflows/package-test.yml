name: Package Validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      package:
        description: 'Single package to validate (pkgname or packages/<pkgname>, optional)'
        required: false
        type: string

jobs:
  framework-boundary:
    name: Check framework boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check framework boundaries
        run: |
          scripts/ci.sh package-test-boundary

  discovery:
    name: Resolve validation matrix
    needs: framework-boundary
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_packages: ${{ steps.set-matrix.outputs.has_packages }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: set-matrix
        name: Select packages to validate
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_PACKAGE: ${{ github.event.inputs.package || '' }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_COMPARE_SHA: ${{ github.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before || '' }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          scripts/ci.sh package-test-discover

  test:
    name: Validate ${{ matrix.package }}
    needs: discovery
    runs-on: ubuntu-latest
    if: needs.discovery.outputs.has_packages == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discovery.outputs.matrix) }}

    container:
      image: archlinux:base-devel@sha256:01bd0ee1c23c3dec1dcb0fce558150a222ee2ef0a3776404de33d0714bcefbb0

    steps:
      - uses: actions/checkout@v6

      - name: Build, install, and smoke test package
        env:
          CI: true
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          scripts/ci.sh package-test-run "${{ matrix.package }}"
