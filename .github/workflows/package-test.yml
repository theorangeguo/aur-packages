name: Package Validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      package:
        description: 'Single package to validate (pkgname or packages/<pkgname>, optional)'
        required: false
        type: string

jobs:
  framework-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check framework boundaries
        run: |
          python3 scripts/aurpkg.py check-framework-boundaries

  discovery:
    needs: framework-boundary
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_packages: ${{ steps.set-matrix.outputs.has_packages }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: set-matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_PACKAGE: ${{ github.event.inputs.package || '' }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          PR_COMPARE_SHA: ${{ github.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before || '' }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          ARGS=()
          if [ -n "$MANUAL_PACKAGE" ]; then
            ARGS+=(--package "$MANUAL_PACKAGE")
          elif [ "$EVENT_NAME" = "pull_request" ] && [ -n "$PR_BASE_SHA" ] && [ -n "$PR_COMPARE_SHA" ]; then
            ARGS+=(--base-ref "$PR_BASE_SHA" --head-ref "$PR_COMPARE_SHA")
          elif [ "$EVENT_NAME" = "push" ] && [ -n "$PUSH_BEFORE_SHA" ] && [ "$PUSH_BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            ARGS+=(--base-ref "$PUSH_BEFORE_SHA" --head-ref "$PUSH_SHA")
          fi
          python3 scripts/aurpkg.py discover "${ARGS[@]}"

  test:
    needs: discovery
    runs-on: ubuntu-latest
    if: needs.discovery.outputs.has_packages == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discovery.outputs.matrix) }}

    container:
      image: archlinux:base-devel@sha256:01bd0ee1c23c3dec1dcb0fce558150a222ee2ef0a3776404de33d0714bcefbb0

    steps:
      - uses: actions/checkout@v6

      - name: Package validation
        env:
          CI: true
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          pacman-key --init >/dev/null 2>&1
          pacman -Syu --needed --noconfirm git openssh pacman-contrib sudo curl jq python
          python3 scripts/aurpkg.py setup-user
          python3 scripts/aurpkg.py run-test "${{ matrix.package }}"
