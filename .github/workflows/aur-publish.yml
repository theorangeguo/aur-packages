name: Publish to AUR

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      package:
        description: 'Single package to publish (pkgname or packages/<pkgname>, optional)'
        required: false
        type: string
      dry_run:
        description: 'Dry run'
        required: false
        type: boolean
        default: false
      cache_policy:
        description: 'Detector cache policy'
        required: false
        type: choice
        options:
          - normal
          - refresh
        default: normal
      dispatch_policy:
        description: 'Package dispatch policy'
        required: false
        type: choice
        options:
          - auto
          - changed-only
          - selected
        default: auto

env:
  AUR_USERNAME: ${{ secrets.AUR_USERNAME }}
  AUR_EMAIL: ${{ secrets.AUR_EMAIL }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: aur-publish
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------------------------
  # Phase 1: Discovery
  # ----------------------------------------------------------------------------
  discovery:
    name: Resolve publish matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_packages: ${{ steps.set-matrix.outputs.has_packages }}
      state_file: ${{ steps.set-matrix.outputs.state_file }}
      failed_packages: ${{ steps.set-matrix.outputs.failed_packages }}
      has_detection_failures: ${{ steps.set-matrix.outputs.has_detection_failures }}
      detection_failure_count: ${{ steps.set-matrix.outputs.detection_failure_count }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Restore upstream detector cache
        uses: actions/cache/restore@v4
        with:
          path: .update-state
          key: update-state-${{ github.run_id }}
          restore-keys: |
            update-state-

      - id: set-matrix
        name: Detect changed packages
        env:
          MANUAL_PACKAGE: ${{ github.event.inputs.package || '' }}
          CACHE_POLICY: ${{ github.event.inputs.cache_policy || 'normal' }}
          DISPATCH_POLICY: ${{ github.event.inputs.dispatch_policy || 'auto' }}
          DETECTION_FAILURE_POLICY: ${{ vars.DETECTION_FAILURE_POLICY || '' }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          scripts/ci.sh aur-publish-discover

      - name: Upload detector state artifact
        if: steps.set-matrix.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: update-detector-state
          path: .update-state
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  # ----------------------------------------------------------------------------
  # Phase 2: Execution
  # ----------------------------------------------------------------------------
  update:
    name: Publish ${{ matrix.package }} to AUR
    needs: discovery
    runs-on: ubuntu-latest
    if: needs.discovery.outputs.has_packages == 'true'
    strategy:
      fail-fast: false
      # AUR is sensitive to bursty HTTPS clone/status requests. Publish one
      # package at a time so one workflow run does not amplify transient AUR
      # instability across the whole matrix.
      max-parallel: 1
      matrix: ${{ fromJson(needs.discovery.outputs.matrix) }}

    concurrency:
      group: aur-publish-${{ matrix.package }}
      cancel-in-progress: false

    container:
      image: archlinux:base-devel@sha256:01bd0ee1c23c3dec1dcb0fce558150a222ee2ef0a3776404de33d0714bcefbb0

    steps:
      - uses: actions/checkout@v6

      # Unified Environment Setup & Execution
      - name: Build and publish package
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          CI: true
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          scripts/ci.sh aur-publish-run "${{ matrix.package }}"

  save-detector-state:
    name: Persist detector state
    needs:
      - discovery
      - update
    runs-on: ubuntu-latest
    if: always() && github.event.inputs.dry_run != 'true' && needs.discovery.result == 'success' && (needs.update.result == 'success' || needs.update.result == 'skipped')
    steps:
      - name: Download detector state artifact
        uses: actions/download-artifact@v4
        with:
          name: update-detector-state
          path: .update-state

      - name: Save detector state cache
        uses: actions/cache/save@v4
        with:
          path: .update-state
          key: update-state-${{ github.run_id }}

  report-detection-failures:
    name: Report upstream detection failures
    needs:
      - discovery
      - update
      - save-detector-state
    runs-on: ubuntu-latest
    if: always() && needs.discovery.result == 'success'
    steps:
      - name: Report upstream detection failures
        env:
          FAILED_PACKAGES: ${{ needs.discovery.outputs.failed_packages || '[]' }}
          HAS_DETECTION_FAILURES: ${{ needs.discovery.outputs.has_detection_failures || 'false' }}
          DETECTION_FAILURE_COUNT: ${{ needs.discovery.outputs.detection_failure_count || '0' }}
          DETECTION_FAILURE_REPORT_LEVEL: ${{ vars.DETECTION_FAILURE_REPORT_LEVEL || 'warn' }}
        run: |
          echo "Detection failure count: ${DETECTION_FAILURE_COUNT}"
          echo "Failed packages: ${FAILED_PACKAGES}"
          echo "Detection failure report level: ${DETECTION_FAILURE_REPORT_LEVEL}"

          if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
            {
              echo "## Upstream detection failures"
              echo
              echo "- Count: ${DETECTION_FAILURE_COUNT}"
              echo "- Failed packages: \`${FAILED_PACKAGES}\`"
              echo "- Report level: \`${DETECTION_FAILURE_REPORT_LEVEL}\`"
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

          if [ "${HAS_DETECTION_FAILURES}" != "true" ]; then
            exit 0
          fi

          echo "::warning title=Upstream detection failures::${DETECTION_FAILURE_COUNT} package(s) failed upstream detection: ${FAILED_PACKAGES}"
          case "${DETECTION_FAILURE_REPORT_LEVEL}" in
            fail)
              exit 1
              ;;
            warn)
              exit 0
              ;;
            *)
              echo "::warning title=Invalid detection failure report level::Unsupported DETECTION_FAILURE_REPORT_LEVEL '${DETECTION_FAILURE_REPORT_LEVEL}', treating as warn"
              exit 0
              ;;
          esac
