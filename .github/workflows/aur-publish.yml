name: Publish to AUR

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      package:
        description: 'Single package to publish (pkgname or packages/<pkgname>, optional)'
        required: false
        type: string
      dry_run:
        description: 'Dry run'
        required: false
        type: boolean
        default: false
      cache_policy:
        description: 'Detector cache policy'
        required: false
        type: choice
        options:
          - normal
          - refresh
        default: normal
      dispatch_policy:
        description: 'Package dispatch policy'
        required: false
        type: choice
        options:
          - auto
          - changed-only
          - selected
        default: auto

env:
  AUR_USERNAME: ${{ secrets.AUR_USERNAME }}
  AUR_EMAIL: ${{ secrets.AUR_EMAIL }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: aur-publish
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------------------------
  # Phase 1: Discovery
  # ----------------------------------------------------------------------------
  discovery:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_packages: ${{ steps.set-matrix.outputs.has_packages }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Restore update detector state
        uses: actions/cache/restore@v4
        with:
          path: .update-state
          key: update-state-${{ github.run_id }}
          restore-keys: |
            update-state-

      - id: set-matrix
        env:
          MANUAL_PACKAGE: ${{ github.event.inputs.package || '' }}
          CACHE_POLICY: ${{ github.event.inputs.cache_policy || 'normal' }}
          DISPATCH_POLICY: ${{ github.event.inputs.dispatch_policy || 'auto' }}
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
        run: |
          ARGS=(--cache-policy "$CACHE_POLICY" --dispatch-policy "$DISPATCH_POLICY")
          if [ -n "$MANUAL_PACKAGE" ]; then
            ARGS+=(--package "$MANUAL_PACKAGE")
          elif [ "$DISPATCH_POLICY" = "selected" ]; then
            echo "dispatch_policy=selected requires package" >&2
            exit 1
          fi

          python3 scripts/aurpkg.py detect-updates "${ARGS[@]}"

      - name: Upload update detector state
        if: steps.set-matrix.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: update-detector-state
          path: .update-state
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  # ----------------------------------------------------------------------------
  # Phase 2: Execution
  # ----------------------------------------------------------------------------
  update:
    needs: discovery
    runs-on: ubuntu-latest
    if: needs.discovery.outputs.has_packages == 'true'
    strategy:
      fail-fast: false
      # AUR is sensitive to bursty HTTPS clone/status requests. Publish one
      # package at a time so one workflow run does not amplify transient AUR
      # instability across the whole matrix.
      max-parallel: 1
      matrix: ${{ fromJson(needs.discovery.outputs.matrix) }}

    concurrency:
      group: aur-publish-${{ matrix.package }}
      cancel-in-progress: false

    container:
      image: archlinux:base-devel@sha256:01bd0ee1c23c3dec1dcb0fce558150a222ee2ef0a3776404de33d0714bcefbb0

    steps:
      - uses: actions/checkout@v6

      # Unified Environment Setup & Execution
      - name: Pipeline Execution
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          CI: true
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # 1. Install System Dependencies
          pacman-key --init >/dev/null 2>&1
          pacman -Syu --needed --noconfirm git openssh pacman-contrib sudo curl jq python

          # 2. Fast metadata/asset preflight
          python3 scripts/aurpkg.py preflight "${{ matrix.package }}"

          # 3. Setup Build User
          python3 scripts/aurpkg.py setup-user

          # 4. Construct Arguments
          ARGS=()
          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then ARGS+=(--dry-run); fi

          # 5. Run publish path with package validation
          python3 scripts/aurpkg.py run-publish "${{ matrix.package }}" --verify-install "${ARGS[@]}"

  save-detector-state:
    needs:
      - discovery
      - update
    runs-on: ubuntu-latest
    if: always() && github.event.inputs.dry_run != 'true' && needs.discovery.result == 'success' && (needs.update.result == 'success' || needs.update.result == 'skipped')
    steps:
      - name: Download update detector state
        uses: actions/download-artifact@v4
        with:
          name: update-detector-state
          path: .update-state

      - name: Save update detector state
        uses: actions/cache/save@v4
        with:
          path: .update-state
          key: update-state-${{ github.run_id }}
