name: Publish to AUR

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      package:
        description: 'Single package to publish (optional)'
        required: false
        type: string
      dry_run:
        description: 'Dry run'
        required: false
        type: boolean
        default: false

env:
  AUR_USERNAME: ${{ secrets.AUR_USERNAME }}
  AUR_EMAIL: ${{ secrets.AUR_EMAIL }}

jobs:
  # ----------------------------------------------------------------------------
  # Phase 1: Discovery
  # ----------------------------------------------------------------------------
  discovery:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_packages: ${{ steps.set-matrix.outputs.has_packages }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: set-matrix
        env:
          MANUAL_PACKAGE: ${{ github.event.inputs.package || '' }}
        run: |
          chmod +x scripts/ci_manager.sh
          if [ -n "$MANUAL_PACKAGE" ]; then
            ./scripts/ci_manager.sh discover --package "$MANUAL_PACKAGE"
          else
            ./scripts/ci_manager.sh discover
          fi

  # ----------------------------------------------------------------------------
  # Phase 2: Execution
  # ----------------------------------------------------------------------------
  update:
    needs: discovery
    runs-on: ubuntu-latest
    if: needs.discovery.outputs.has_packages == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discovery.outputs.matrix) }}

    concurrency:
      group: aur-publish-${{ matrix.package }}
      cancel-in-progress: false

    container:
      image: archlinux:base-devel@sha256:01bd0ee1c23c3dec1dcb0fce558150a222ee2ef0a3776404de33d0714bcefbb0

    steps:
      - uses: actions/checkout@v6

      # Unified Environment Setup & Execution
      - name: Pipeline Execution
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          CI: true
        run: |
          chmod +x scripts/ci_manager.sh

          # 1. Install System Dependencies
          ./scripts/ci_manager.sh install

          # 2. Setup Build User
          ./scripts/ci_manager.sh setup_user

          # 3. Construct Arguments
          ARGS=()
          if [ "${{ github.event.inputs.dry_run || 'false' }}" = "true" ]; then ARGS+=(--dry-run); fi

          # 4. Run Update + Install Verification
          ./scripts/ci_manager.sh run_update "${{ matrix.package }}" --verify-install "${ARGS[@]}"
