name: Build binary releases

on:
  schedule:
    - cron: '30 */6 * * *'
  workflow_dispatch:
    inputs:
      package:
        description: 'Single binary-release package to build (pkgname or packages/<pkgname>, optional)'
        required: false
        type: string
      upstream_version:
        description: 'Upstream version to build, with or without leading tag prefix (optional)'
        required: false
        type: string
      force:
        description: 'Rebuild and replace assets even if the expected release assets already exist'
        required: false
        type: boolean
        default: false
  push:
    branches-ignore:
      - main
    paths:
      - '.github/workflows/build-binary-releases.yml'
      - 'scripts/**'
      - 'packages/**'

permissions:
  contents: write

concurrency:
  group: build-binary-releases-${{ github.ref }}
  cancel-in-progress: false

jobs:
  discovery:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_packages: ${{ steps.set-matrix.outputs.has_packages }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: set-matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          MANUAL_PACKAGE: ${{ github.event.inputs.package || '' }}
          MANUAL_UPSTREAM_VERSION: ${{ github.event.inputs.upstream_version || '' }}
          PUSH_BEFORE_SHA: ${{ github.event.before || '' }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          scripts/ci.sh binary-release-discover

  build:
    needs: discovery
    runs-on: ubuntu-latest
    if: github.repository == 'orange-guo/aur-packages' && needs.discovery.outputs.has_packages == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discovery.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Build and publish binary release
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          MANUAL_UPSTREAM_VERSION: ${{ github.event.inputs.upstream_version || '' }}
          FORCE_REBUILD: ${{ github.event.inputs.force || 'false' }}
        run: |
          scripts/ci.sh binary-release-run "${{ matrix.package }}"
