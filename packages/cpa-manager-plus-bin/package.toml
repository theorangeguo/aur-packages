spec_version = 1
name = "cpa-manager-plus-bin"
template = "binary-archive"

[metadata]
desc = "Management panel and analytics server for CLIProxyAPI"
url = "https://github.com/seakee/CPA-Manager-Plus"
licenses = ["MIT"]
arches = ["x86_64", "aarch64"]
depends = []
makedepends = []
checkdepends = []
optdepends = ["cli-proxy-api: local CLIProxyAPI backend for management and usage collection"]
options = ["!strip"]
provides = ["cpa-manager-plus"]
conflicts = ["cpa-manager-plus", "cpa-manager", "cpa"]
validpgpkeys = []

[version]
from = "origin"
origin = "release"

[origins.release]
type = "github-release"
repo = "seakee/CPA-Manager-Plus"
tag_prefix = "v"

[inputs.sources.binary-x86_64]
from = "github-release-asset"
origin = "release"
arch = "x86_64"
selector = '''^cpa-manager-plus_v.*_linux_amd64\.tar\.gz$'''
rename = '''${pkgname}-${pkgver}-x86_64.tar.gz'''

[inputs.sources.binary-aarch64]
from = "github-release-asset"
origin = "release"
arch = "aarch64"
selector = '''^cpa-manager-plus_v.*_linux_(arm64|aarch64)\.tar\.gz$'''
rename = '''${pkgname}-${pkgver}-aarch64.tar.gz'''

[package]
binary_name = "cpa-manager-plus"
binary_source_path = "*/cpa-manager-plus"
install_bin_path = "/usr/bin/cpa-manager-plus"

[files]
local = ["files/cpa-manager-plus.env.example"]
docs = ["cpa-manager-plus.env.example", "*/README.md", "*/README_CN.md", "*/docs"]
licenses = ["*/LICENSE"]

[install]
mode = "generated"
hints = [
  ":: CPA Manager Plus needs a running CLIProxyAPI/CPA instance for management and usage collection.",
  ":: It can connect to either a local cli-proxy-api service or a remote CPA endpoint.",
  ":: Configure the user service before starting it:",
  "   install -Dm600 /usr/share/doc/cpa-manager-plus-bin/cpa-manager-plus.env.example ~/.config/cpa-manager-plus/cpa-manager-plus.env",
  "   $EDITOR ~/.config/cpa-manager-plus/cpa-manager-plus.env",
  ":: Set CPA_UPSTREAM_URL and CPA_MANAGEMENT_KEY to match your CPA Management API.",
  ":: Set CPA_MANAGER_ADMIN_KEY for logging in to the Manager web UI; it is separate from CPA_MANAGEMENT_KEY.",
  ":: Then start the user service:",
  "   systemctl --user enable --now cpa-manager-plus.service",
  ":: After editing the env file, restart the service:",
  "   systemctl --user restart cpa-manager-plus.service",
  ":: The user service stores data and the SQLite database under ~/.local/state/cpa-manager-plus.",
  ":: CPA Manager Plus persists the Manager Admin Key in SQLite on first initialization.",
  ":: Changing CPA_MANAGER_ADMIN_KEY later requires: cpa-manager-plus reset-admin-key --db-path ~/.local/state/cpa-manager-plus/usage.sqlite --admin-key-file <key-file>",
  ":: For usage collection, enable usage-statistics-enabled in CPA and keep only one Manager Server consuming the same CPA usage queue.",
  ":: To start without an active login session, enable linger: loginctl enable-linger $USER",
]

[service]
mode = "static"
scope = "user"
name = "cpa-manager-plus.service"
file = "files/cpa-manager-plus.service"

[tests]
paths = ["/usr/share/licenses/cpa-manager-plus-bin/LICENSE"]
executables = ["/usr/bin/cpa-manager-plus"]
