PKGNAME=cpa-usage-keeper-bin
PACKAGE_TEMPLATE=binary-archive
UPSTREAM_TYPE=github-release-assets

PKGDESC="Standalone CLIProxyAPI usage persistence and dashboard service (Binary)"
URL="https://github.com/Willxup/cpa-usage-keeper"
LICENSES=('MIT')
ARCHES=('x86_64' 'aarch64')
DEPENDS=('glibc')
MAKEDEPENDS=()
CHECKDEPENDS=()
OPTDEPENDS=('cli-proxy-api: local CLIProxyAPI backend')
OPTIONS=('!strip')
PROVIDES=('cpa-usage-keeper')
CONFLICTS=('cpa-usage-keeper')
VALIDPGPKEYS=()

UPSTREAM_REPO_USER="Willxup"
UPSTREAM_REPO_NAME="cpa-usage-keeper"
UPSTREAM_TAG_PREFIX="v"

ASSET_SELECTOR_X86_64='^cpa-usage-keeper_v.*_linux_amd64\.tar\.gz$'
ASSET_SELECTOR_AARCH64='^cpa-usage-keeper_v.*_linux_(arm64|aarch64)\.tar\.gz$'
SOURCE_RENAME_X86_64='${pkgname}-${pkgver}-x86_64.tar.gz'
SOURCE_RENAME_AARCH64='${pkgname}-${pkgver}-aarch64.tar.gz'

BINARY_NAME=cpa-usage-keeper
BINARY_SOURCE_PATH='*/cpa-usage-keeper'
INSTALL_BIN_PATH=/usr/bin/cpa-usage-keeper

LOCAL_FILES=('files/cpa-usage-keeper.env.example')
DOC_FILES=('cpa-usage-keeper.env.example' '*/README.md' '*/README.en.md' '*/CONTRIBUTORS.md')
LICENSE_FILES=('*/LICENSE')
TEST_PATHS=()
TEST_EXECUTABLES=()
TEST_COMMANDS=('/usr/bin/cpa-usage-keeper --help')

INSTALL_MODE=generated
INSTALL_HINTS=(':: Copy the example configuration before starting the service:'
               '   install -Dm600 /usr/share/doc/cpa-usage-keeper-bin/cpa-usage-keeper.env.example ~/.config/cpa-usage-keeper/cpa-usage-keeper.env'
               '   $EDITOR ~/.config/cpa-usage-keeper/cpa-usage-keeper.env'
               ':: CLIProxyAPI must publish usage events: set usage-statistics-enabled: true in CLIProxyAPI config.'
               ':: Dashboard listens on APP_PORT from ~/.config/cpa-usage-keeper/cpa-usage-keeper.env, default 8318 in the example.'
               ':: To start without an active login session, enable linger: loginctl enable-linger $USER')
SERVICE_MODE=static
SERVICE_SCOPE=user
SERVICE_NAME=cpa-usage-keeper.service
SERVICE_FILE='files/cpa-usage-keeper.service'
