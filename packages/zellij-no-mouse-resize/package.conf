PKGNAME=zellij-no-mouse-resize
PACKAGE_TEMPLATE=source-cargo
UPSTREAM_TYPE=custom-hook

PKGDESC="Zellij with advanced_mouse_actions also gating pane mouse resize"
URL="https://zellij.dev"
LICENSES=('MIT')
ARCHES=('x86_64')
DEPENDS=('curl' 'libcurl.so' 'glibc' 'libgcc' 'libgcc_s.so' 'zlib' 'libz.so')
MAKEDEPENDS=('cargo')
CHECKDEPENDS=()
OPTDEPENDS=()
OPTIONS=('!lto')
PROVIDES=('zellij')
CONFLICTS=('zellij' 'zellij-bin' 'zellij-git')
VALIDPGPKEYS=()

SOURCE_RENAME='${pkgname}-${pkgver}.tar.gz'
SOURCE_DIR='zellij-${pkgver}'
PATCH_FILES=('files/0001-gate-mouse-resize-behind-advanced-actions.patch')
RUN_CHECK=false
CARGO_FETCH_ARGS=()
CARGO_BUILD_ARGS=('--release' '--frozen')
CARGO_CHECK_ARGS=('--frozen')

BINARY_NAME=zellij
BINARY_SOURCE_PATH=target/release/zellij
INSTALL_BIN_PATH=/usr/bin/zellij

LOCAL_FILES=()
DOC_FILES=('GOVERNANCE.md' 'README.md')
LICENSE_FILES=('LICENSE.md')

INSTALL_MODE=none
SERVICE_MODE=none

TEST_PATHS=()
TEST_EXECUTABLES=()
TEST_COMMANDS=('/usr/bin/zellij --version')
