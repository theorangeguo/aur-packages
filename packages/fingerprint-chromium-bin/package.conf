PACKAGE_SPEC_VERSION=1

PKGNAME=fingerprint-chromium-bin
PACKAGE_TEMPLATE=appimage-desktop
UPSTREAM_TYPE=github-release-assets

PKGDESC="Fingerprint Chromium (Ungoogled Chromium with fingerprinting protection)"
URL="https://github.com/adryfish/fingerprint-chromium"
LICENSES=('BSD')
ARCHES=('x86_64')
DEPENDS=('gtk3' 'nss' 'alsa-lib' 'xdg-utils' 'libxss' 'ttf-liberation')
MAKEDEPENDS=()
OPTIONS=('!strip')
PROVIDES=('fingerprint-chromium')
CONFLICTS=('fingerprint-chromium')

UPSTREAM_REPO_USER="adryfish"
UPSTREAM_REPO_NAME="fingerprint-chromium"
UPSTREAM_TAG_PREFIX=""

ASSET_SELECTOR_X86_64='^ungoogled-chromium-.*-x86_64\.AppImage$'
SOURCE_RENAME_X86_64='${pkgname}-${pkgver}-x86_64.AppImage'

BINARY_NAME=fingerprint-chromium
INSTALL_BIN_PATH=/usr/bin/fingerprint-chromium
APPIMAGE_APPDIR_NAME=squashfs-root
DESKTOP_CANDIDATES=('ungoogled-chromium.desktop' 'fingerprint-chromium.desktop')
ICON_CANDIDATES=('product_logo_256.png')
DESKTOP_EXEC_REWRITE='/usr/bin/fingerprint-chromium'
DESKTOP_NAME_REWRITE='Fingerprint Chromium'

LOCAL_FILES=()
LICENSE_FILES=()
INSTALL_MODE=none
SERVICE_MODE=none
