spec_version = 1
name = "zellij-no-mouse-resize-bin"
template = "binary-archive"

[metadata]
desc = "Zellij with advanced_mouse_actions also gating pane mouse resize"
url = "https://zellij.dev"
licenses = ["MIT"]
arches = ["x86_64"]
depends = ["glibc", "libgcc", "libgcc_s.so", "zlib", "libz.so"]
makedepends = []
checkdepends = []
optdepends = []
options = ["!strip"]
provides = ["zellij", "zellij-no-mouse-resize"]
conflicts = ["zellij", "zellij-bin", "zellij-git", "zellij-no-mouse-resize"]
validpgpkeys = []

[version]
from = "artifact"
artifact = "zellij-binary"

[origins.zellij]
type = "github-release"
repo = "zellij-org/zellij"
tag_prefix = "v"

[package]
binary_name = "zellij"
binary_source_path = "zellij"
install_bin_path = "/usr/bin/zellij"

[inputs.sources.zellij-binary]
from = "artifact"
artifact = "zellij-binary"
arch = "x86_64"
rename = '''${pkgname}-${pkgver}-x86_64.tar.gz'''

[files]
docs = ["README.md"]
licenses = ["LICENSE.md"]

[install]
mode = "none"

[service]
mode = "none"

[tests]
commands = ["/usr/bin/zellij --version"]

[inputs.artifacts.zellij-binary]
type = "archive"
rev = 1
version_template = '''${origin_version}.r${artifact_rev}'''
arches = ["x86_64"]

[inputs.artifacts.zellij-binary.recipe]
type = "cargo-build"
origin = "zellij"
source_dir = '''zellij-${origin_version}'''
patches = ["files/0001-gate-mouse-resize-behind-advanced-actions.patch"]
makedepends = ["ca-certificates", "curl", "git", "patch", "rust", "tar"]
cargo_fetch_args = []
cargo_build_args = ["--release", "--frozen"]
cargo_check_args = ["--frozen"]
run_check = false
archive_files = [
  "target/release/zellij:zellij:755",
  "LICENSE.md:LICENSE.md:644",
  "README.md:README.md:644",
]

[inputs.artifacts.zellij-binary.storage]
type = "github-release"
repo = "theorangeguo/aur-packages"
tag_prefix = "zellij-no-mouse-resize-bin-v"

[inputs.artifacts.zellij-binary.outputs.x86_64]
asset_name = '''${pkgname}-${pkgver}-x86_64-unknown-linux-gnu.tar.gz'''
