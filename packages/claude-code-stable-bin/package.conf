PACKAGE_SPEC_VERSION=1

PKGNAME=claude-code-stable-bin
PACKAGE_TEMPLATE=binary-archive
UPSTREAM_TYPE=custom-hook
SOURCE_RENAME='LICENSE.md'

PKGDESC="Claude Code terminal-based AI coding assistant (stable channel)"
URL="https://github.com/anthropics/claude-code"
LICENSES=('LicenseRef-claude-code')
ARCHES=('x86_64')
DEPENDS=('bash' 'glibc')
MAKEDEPENDS=()
CHECKDEPENDS=()
OPTDEPENDS=('git: allow Claude Code to use git'
            'github-cli: interact with GitHub'
            'glab: interact with GitLab'
            'ripgrep: use system ripgrep if bundled search is disabled')
OPTIONS=('!strip')
PROVIDES=('claude-code' 'claude-code-stable')
CONFLICTS=('claude-code' 'claude-code-bin' 'claude-code-stable' 'claude-code-latest' 'claude-code-latest-bin')

SOURCE_RENAME_X86_64='${pkgname}-${pkgver}-x86_64'

BINARY_NAME=claude
BINARY_SOURCE_PATH='${pkgname}-${pkgver}-x86_64'
INSTALL_BIN_PATH=/usr/lib/claude-code-stable-bin/claude
WRAPPER_SOURCE_PATH=claude-wrapper
WRAPPER_INSTALL_PATH=/usr/bin/claude

LOCAL_FILES=('files/claude-wrapper')
DOC_FILES=()
LICENSE_FILES=('LICENSE.md')
TEST_PATHS=()
TEST_EXECUTABLES=('/usr/bin/claude')
TEST_COMMANDS=('/usr/bin/claude --version')

INSTALL_MODE=generated
INSTALL_HINTS=(':: This package tracks Anthropic Claude Code stable releases.'
               ':: Claude Code may still show latest-channel update prompts by default.'
               ':: To align prompts with this package, set autoUpdatesChannel to "stable" via /config or ~/.claude/settings.json.')
SERVICE_MODE=none
