PACKAGE_SPEC_VERSION=1

PKGNAME=cli-proxy-api-bin
PACKAGE_TEMPLATE=binary-archive
UPSTREAM_TYPE=github-release-assets

PKGDESC="Proxy server providing OpenAI/Gemini/Claude compatible API interfaces"
URL="https://github.com/router-for-me/CLIProxyAPI"
LICENSES=('MIT')
ARCHES=('x86_64' 'aarch64')
DEPENDS=()
MAKEDEPENDS=()
OPTIONS=('!strip')
PROVIDES=('cli-proxy-api')
CONFLICTS=('cli-proxy-api')

UPSTREAM_REPO_USER="router-for-me"
UPSTREAM_REPO_NAME="CLIProxyAPI"
UPSTREAM_TAG_PREFIX="v"

ASSET_SELECTOR_X86_64='^CLIProxyAPI_.*_linux_amd64\.tar\.gz$'
ASSET_SELECTOR_AARCH64='^CLIProxyAPI_.*_linux_(arm64|aarch64)\.tar\.gz$'
SOURCE_RENAME_X86_64='${pkgname}-${pkgver}-x86_64.tar.gz'
SOURCE_RENAME_AARCH64='${pkgname}-${pkgver}-aarch64.tar.gz'

BINARY_NAME=cli-proxy-api
BINARY_SOURCE_PATH=cli-proxy-api
INSTALL_BIN_PATH=/usr/bin/cli-proxy-api

LOCAL_FILES=()
DOC_FILES=('config.example.yaml')
LICENSE_FILES=('LICENSE')

INSTALL_MODE=generated
INSTALL_HINTS=(':: Configuration files are expected in ~/.cli-proxy-api/' '   An example config has been installed to /usr/share/doc/cli-proxy-api-bin/config.example.yaml')
SERVICE_MODE=generated
SERVICE_SCOPE=user
SERVICE_NAME=cli-proxy-api.service
SERVICE_EXEC='/usr/bin/cli-proxy-api --config %h/.cli-proxy-api/config.yaml'
SERVICE_RESTART=always
SERVICE_RESTART_SEC=10
