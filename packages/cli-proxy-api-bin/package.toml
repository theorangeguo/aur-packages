spec_version = 1
name = "cli-proxy-api-bin"
template = "binary-archive"

[metadata]
desc = "Proxy server providing OpenAI/Gemini/Claude compatible API interfaces"
url = "https://github.com/router-for-me/CLIProxyAPI"
licenses = ["MIT"]
arches = ["x86_64", "aarch64"]
depends = []
makedepends = []
options = ["!strip"]
provides = ["cli-proxy-api"]
conflicts = ["cli-proxy-api"]

[version]
from = "origin"
origin = "release"

[origins.release]
type = "github-release"
repo = "router-for-me/CLIProxyAPI"
tag_prefix = "v"

[inputs.sources.binary-x86_64]
from = "github-release-asset"
origin = "release"
arch = "x86_64"
selector = '''^CLIProxyAPI_.*_linux_amd64\.tar\.gz$'''
rename = '''${pkgname}-${pkgver}-x86_64.tar.gz'''

[inputs.sources.binary-aarch64]
from = "github-release-asset"
origin = "release"
arch = "aarch64"
selector = '''^CLIProxyAPI_.*_linux_(arm64|aarch64)\.tar\.gz$'''
rename = '''${pkgname}-${pkgver}-aarch64.tar.gz'''

[package]
binary_name = "cli-proxy-api"
binary_source_path = "cli-proxy-api"
install_bin_path = "/usr/bin/cli-proxy-api"

[files]
docs = ["config.example.yaml"]
licenses = ["LICENSE"]

[install]
mode = "generated"
hints = [
  ":: Configuration files are expected in ~/.cli-proxy-api/",
  "   An example config has been installed to /usr/share/doc/cli-proxy-api-bin/config.example.yaml",
]

[service]
mode = "generated"
scope = "user"
name = "cli-proxy-api.service"
exec = "/usr/bin/cli-proxy-api --config %h/.cli-proxy-api/config.yaml"
restart = "always"
restart_sec = "10"
